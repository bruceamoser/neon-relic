<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 48" width="540" height="48">
  <!-- File folder tab background -->
  <rect x="0" y="20" width="540" height="28" fill="#3a4a2a" opacity="0.18" rx="2"/>
  <rect x="0" y="20" width="540" height="1.5" fill="#4a5a38" opacity="0.6"/>
  <rect x="0" y="46" width="540" height="1.5" fill="#4a5a38" opacity="0.6"/>
  <!-- Perforations -->
  <line x1="0" y1="10" x2="540" y2="10" stroke="#9a8a6a" stroke-width="1" stroke-dasharray="4,5" opacity="0.5"/>
  <!-- Folder tab notch left -->
  <rect x="18" y="0" width="100" height="22" rx="3" ry="3" fill="#3a4a2a" opacity="0.25"/>
  <rect x="18" y="0" width="100" height="22" rx="3" ry="3" fill="none" stroke="#4a5a38" stroke-width="1" opacity="0.5"/>
  <text x="68" y="15"
        font-family="'Courier New', Courier, monospace"
        font-size="8" font-weight="bold" fill="#4a5a38"
        text-anchor="middle" letter-spacing="2" opacity="0.8">COVENANT FILE</text>
</svg>
