# Neon Relic — asciidoctor-pdf theme
# Style: Government dossier / classified file / spy tropes
# Palette: aged manila paper, olive/forest green ink, red classification stamps

extends: default

# ── GLOBAL BASE ─────────────────────────────────────────────────────────────────────────────
base:
  font-color: '#1e2010'
  background-color: '#f0ead6'
  font-family: Courier
  font-size: 10
  line-height: 1.45

# ── PAGE ─────────────────────────────────────────────────────────────────────────────────
page:
  background-color: '#f0ead6'
  margin: [22mm, 20mm, 24mm, 20mm]
  size: LETTER
  columns: 2
  column-gap: 5mm

# ── TITLE PAGE (custom SVG, so keep this minimal) ──────────────────────────────────────
title-page:
  background-color: '#e8e0c8'
  background-image: image:../../assets/svg/title-page-dossier.svg[fit=fill]
  title:
    font-size: 1
    font-color: '#e8e0c8'
    margin-top: 1
    margin-bottom: 1
  subtitle:
    font-size: 1
    font-color: '#e8e0c8'
  authors:
    font-size: 1
    font-color: '#e8e0c8'
  revision:
    font-size: 1
    font-color: '#e8e0c8'

# ── RUNNING HEADER / FOOTER ──────────────────────────────────────────────────────
header:
  height: 14mm
  border-width: 0
  border-color: '#4a5a38'
  padding: [0, 0, 3mm, 0]
  recto:
    left:
      content: '{page-number}'
      font-family: Courier
      font-size: 8
      font-color: '#6a7a58'
    center:
      content: 'TOP SECRET — VERDANT COVENANT — EYES ONLY'
      font-family: Courier
      font-size: 7
      font-style: bold
      font-color: '#7a1212'
    right:
      content: '{chapter-title}'
      font-family: Courier
      font-size: 8
      font-color: '#6a7a58'
  verso:
    left:
      content: '{chapter-title}'
      font-family: Courier
      font-size: 8
      font-color: '#6a7a58'
    center:
      content: 'TOP SECRET — VERDANT COVENANT — EYES ONLY'
      font-family: Courier
      font-size: 7
      font-style: bold
      font-color: '#7a1212'
    right:
      content: '{page-number}'
      font-family: Courier
      font-size: 8
      font-color: '#6a7a58'
  line-metrics-scale-factor: 1

footer:
  height: 13mm
  border-width: 1
  border-color: '#4a5a38'
  padding: [3mm, 0, 0, 0]
  recto:
    left:
      content: 'FORM VC-1 · REV. 1987 · INTERNAL USE ONLY'
      font-family: Courier
      font-size: 7
      font-color: '#7a7a5a'
    right:
      content: 'COPY NO. ___   PAGE {page-number} OF {page-count}'
      font-family: Courier
      font-size: 7
      font-color: '#7a7a5a'
  verso:
    left:
      content: 'COPY NO. ___   PAGE {page-number} OF {page-count}'
      font-family: Courier
      font-size: 7
      font-color: '#7a7a5a'
    right:
      content: 'FORM VC-1 · REV. 1987 · INTERNAL USE ONLY'
      font-family: Courier
      font-size: 7
      font-color: '#7a7a5a'

# ── HEADINGS ─────────────────────────────────────────────────────────────────────────────────
heading:
  font-color: '#1e2c0e'
  font-family: Courier
  font-style: bold
  line-height: 1.2
  margin-top: 6mm
  margin-bottom: 2mm

heading-h1:
  font-size: 20
  font-color: '#1a2a0e'
  border-color: '#4a5a38'
  border-width: 0 0 2 0
  padding: [2mm, 0, 2mm, 4mm]
  text-transform: uppercase

heading-h2:
  font-size: 14
  font-color: '#2a3a1a'
  border-color: '#7a8a6a'
  border-width: 0 0 1 0
  padding: [1mm, 0, 1mm, 0]
  text-align: center
  text-transform: uppercase

heading-h3:
  font-size: 11
  font-color: '#3a4a28'
  font-style: bold_italic

heading-h4:
  font-size: 10
  font-color: '#4a5a38'
  font-style: italic

# ── PROSE ─────────────────────────────────────────────────────────────────────────────────────
prose:
  margin-top: 0
  margin-bottom: 3mm

# ── LINKS ────────────────────────────────────────────────────────────────────────────────────
link:
  font-color: '#2a4a8a'

# ── TABLES ───────────────────────────────────────────────────────────────────────────────────
table:
  font-size: 9
  background-color: '#f8f4e4'
  head-background-color: '#3a4a2a'
  head-font-color: '#f0ead6'
  head-font-style: bold
  border-color: '#7a8a6a'
  border-width: 1
  cell-padding: [2mm, 2mm, 2mm, 2mm]
  cell-font-color: '#1e2010'
  stripe-background-color: '#e8e4d0'
  header-border-bottom-width: 2

# ── CODE ─────────────────────────────────────────────────────────────────────────────────────
code:
  font-family: Courier
  font-size: 9
  background-color: '#e4dfc8'
  font-color: '#1e2010'
  border-color: '#9a9a7a'
  border-width: 1
  padding: [2mm, 3mm, 2mm, 3mm]

# ── QUOTES / ADMONITIONS ─────────────────────────────────────────────────────────
quote:
  border-left-width: 3
  border-left-color: '#4a5a38'
  font-color: '#3a3a28'
  font-style: italic
  padding: [2mm, 4mm, 2mm, 4mm]

admonition:
  label:
    font-family: Courier
    font-style: bold
    font-size: 9
    font-color: '#1a2a0e'
  background-color: '#ddd8c0'
  border-width: 1
  border-color: '#4a5a38'
  column-rule-color: '#4a5a38'
  column-rule-width: 2
  padding: [2mm, 3mm, 2mm, 3mm]
  font-color: '#1e2010'
  label-text-align: center

# ── CAUTION / WARNING (use red) ─────────────────────────────────────────────────────────
# (asciidoctor-pdf note types: NOTE, TIP, IMPORTANT, WARNING, CAUTION)

# ── SIDEBAR ────────────────────────────────────────────────────────────────────────────────
sidebar:
  background-color: '#ddd8c0'
  border-width: 1
  border-color: '#4a5a38'
  font-color: '#1e2010'
  title-font-color: '#1a2a0e'
  title-font-style: bold
  padding: [3mm, 4mm, 3mm, 4mm]

# ── LIST ─────────────────────────────────────────────────────────────────────────────────────
list:
  marker-font-color: '#4a5a38'
  item-spacing: 2mm

# ── TOC ─────────────────────────────────────────────────────────────────────────────────────
toc:
  font-color: '#1e2010'
  font-family: Courier
  font-size: 10
  line-height: 1.6
  hanging-indent: 4mm
  indent: 8mm
  dot-leader-color: '#9a9a7a'
  title-font-size: 14
  title-font-color: '#1a2a0e'
  title-font-style: bold
  title-text-transform: uppercase
