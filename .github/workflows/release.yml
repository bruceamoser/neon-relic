name: Release Starter Kit

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install asciidoctor-pdf
        run: gem install asciidoctor-pdf

      - name: Build rulebook PDF
        run: |
          mkdir -p starter-kit
          asciidoctor-pdf docs/neon-relic.adoc -o starter-kit/neon-relic-core-rules.pdf

      - name: Build case file instructions PDF
        run: asciidoctor-pdf docs/case-file-instructions.adoc -o starter-kit/case-file-instructions.pdf

      - name: Build HTML PDFs via Chrome headless
        run: |
          CHROME=$(which google-chrome || which chromium-browser)

          html_to_pdf() {
            local html_file="$1"
            local pdf_file="$2"
            "$CHROME" --headless --disable-gpu --no-sandbox --no-pdf-header-footer \
              --print-to-pdf="$pdf_file" "file://$(realpath "$html_file")"
          }

          # Character sheet and case file form
          html_to_pdf assets/character-sheet.html starter-kit/agent-dossier-blank.pdf
          html_to_pdf assets/case-file-form.html  starter-kit/case-file-form-blank.pdf

          # Prebuilt character dossiers
          for f in assets/prebuilt/*.html; do
            name=$(basename "$f" .html)
            html_to_pdf "$f" "starter-kit/${name}.pdf"
          done

      - name: Package starter-kit.zip
        run: cd starter-kit && zip -r ../starter-kit.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: starter-kit.zip
          generate_release_notes: true
