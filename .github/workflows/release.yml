name: Release Starter Kit

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install asciidoctor-pdf
        run: gem install asciidoctor-pdf

      - name: Build rulebook PDF
        run: |
          mkdir -p starter-kit
          asciidoctor-pdf docs/neon-relic.adoc -o starter-kit/neon-relic-core-rules.pdf

      - name: Build case file instructions PDF
        run: asciidoctor-pdf docs/case-file-instructions.adoc -o starter-kit/case-file-instructions.pdf

      - name: Build self-contained HTML files
        run: |
          # Base64-encode fonts
          SE_B64=$(base64 -w0 docs/themes/SpecialElite-Regular.ttf)
          CP_B64=$(base64 -w0 docs/themes/CourierPrime-Regular.ttf)
          SE_URI="data:font/truetype;base64,${SE_B64}"
          CP_URI="data:font/truetype;base64,${CP_B64}"

          inline_fonts() {
            local src="$1" dest="$2"
            sed \
              -e "s|url(['\"]\\?[^'\"]*SpecialElite-Regular\\.ttf['\"]\\?)|url('${SE_URI}')|g" \
              -e "s|url(['\"]\\?[^'\"]*CourierPrime-Regular\\.ttf['\"]\\?)|url('${CP_URI}')|g" \
              "$src" > "$dest"
          }

          # Character sheet and case file form
          inline_fonts assets/character-sheet.html starter-kit/agent-dossier-blank.html
          inline_fonts assets/case-file-form.html  starter-kit/case-file-form-blank.html

          # Prebuilt character dossiers
          for f in assets/prebuilt/*.html; do
            name=$(basename "$f")
            inline_fonts "$f" "starter-kit/${name}"
          done

      - name: Package starter-kit.zip
        run: cd starter-kit && zip -r ../starter-kit.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: starter-kit.zip
          generate_release_notes: true
